<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ewk labs | Experimental AI Studio</title>
<meta name="description" content="ewk labs is an experimental AI studio based in Seattle. We build niche, interesting products at the intersection of AI and design.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #E8380D;
  --accent-gradient: linear-gradient(135deg, #E8380D, #D946EF);
  --accent-gradient-warm: linear-gradient(135deg, #E8380D, #F97316, #FBBF24);
  --surface: #FFFFFF;
  --text-primary: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-muted: #999999;
  --glass-bg: rgba(255,255,255,0.55);
  --glass-blur: blur(36px);
  --glass-border: rgba(255,255,255,0.5);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.02);
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  color: var(--text-primary);
  background: #FFFFFF;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Ambient gradient orbs — now parallax-driven via JS */
.ambient-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  will-change: transform;
}
.ambient-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  will-change: transform;
}
.ambient-orb-1 { width: 800px; height: 800px; top: -5%; left: -5%; background: rgba(232,56,13,0.10); }
.ambient-orb-2 { width: 700px; height: 700px; top: 10%; right: -10%; background: rgba(217,70,239,0.07); }
.ambient-orb-3 { width: 600px; height: 600px; top: 45%; left: 30%; background: rgba(232,56,13,0.06); }
.ambient-orb-4 { width: 700px; height: 700px; top: 70%; right: 5%; background: rgba(120,80,200,0.05); }
.ambient-orb-5 { width: 500px; height: 500px; top: 80%; left: 5%; background: rgba(249,115,22,0.05); }

/* Noise overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}


/* Scroll progress — gradient */
#progress {
  position: fixed;
  left: 0;
  top: 0;
  width: 2px;
  height: 0%;
  background: var(--accent-gradient);
  z-index: 1000;
  transition: height 0.1s linear;
}

/* Reveal system */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.8s var(--ease-out), transform 0.8s var(--ease-out);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; }
.reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; }
.reveal-delay-4 { transition-delay: 0.4s; }
.reveal-delay-5 { transition-delay: 0.5s; }

/* Glass nav */
.glass-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 1.25rem 4rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(40px) saturate(1.4);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  border-bottom: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 1px 16px rgba(0,0,0,0.03);
}

.nav-mark {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-primary);
  text-decoration: none;
  font-weight: 500;
}

.nav-links {
  display: flex;
  gap: 2.5rem;
  align-items: center;
}

.nav-links a {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--accent); }

.nav-shop-cta {
  padding: 0.4rem 1.2rem;
  border: 1px solid transparent;
  border-radius: 4px;
  background: linear-gradient(#fff, #fff) padding-box, var(--accent-gradient) border-box;
  color: var(--accent) !important;
  transition: box-shadow 0.3s !important;
}
.nav-shop-cta:hover {
  box-shadow: 0 4px 16px rgba(232,56,13,0.15) !important;
}

/* Hero */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  position: relative;
  overflow: hidden;
  background: transparent;
  padding: 0 4rem 8rem;
}

#hero-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0.4;
}


@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(232, 56, 13, 0.4); }
  50% { opacity: 0.6; box-shadow: 0 0 0 12px rgba(232, 56, 13, 0); }
}


.hero-content {
  position: relative;
  z-index: 2;
  will-change: transform;
}

.hero-title {
  font-family: var(--font-sans);
  font-size: clamp(5rem, 15vw, 14rem);
  font-weight: 300;
  line-height: 0.85;
  letter-spacing: -0.04em;
  color: var(--text-primary);
  margin-bottom: 2rem;
}

.hero-title .char {
  display: inline-block;
  opacity: 0;
  transform: translateY(60px);
  animation: char-reveal 0.8s var(--ease-out) forwards;
}

@keyframes char-reveal {
  to { opacity: 1; transform: translateY(0); }
}

.hero-subtitle {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Section headers — clean, minimal */
.section-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}

.section-title {
  font-family: var(--font-sans);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 300;
  color: var(--text-primary);
  line-height: 1.1;
  letter-spacing: -0.025em;
}

/* Projects: Animation-forward cards */
#projects {
  padding: 8rem 4rem;
  max-width: 1400px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.catalog-entries {
  margin-top: 4rem;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.5rem;
}

.catalog-entry {
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: inherit;
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(36px) saturate(1.3);
  -webkit-backdrop-filter: blur(36px) saturate(1.3);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: var(--glass-shadow);
  overflow: hidden;
  transition: transform 0.5s var(--ease-out), box-shadow 0.5s var(--ease-out);
  will-change: transform;
}

.catalog-entry:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 56px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.03);
}

.catalog-entry:hover .entry-visual { opacity: 1; }
.catalog-entry:hover .entry-meta { opacity: 1; max-height: 120px; margin-top: 0.75rem; }
.catalog-entry:hover .entry-arrow { opacity: 1; transform: translateX(0); }

.entry-visual {
  width: 100%;
  aspect-ratio: 16/10;
  position: relative;
  overflow: hidden;
  background: rgba(250,250,250,0.5);
  opacity: 0.85;
  transition: opacity 0.5s;
}

.entry-visual canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.entry-info {
  padding: 1.5rem 2rem 2rem;
  position: relative;
}

.entry-name {
  font-family: var(--font-sans);
  font-size: 1.35rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.15rem;
}

.entry-type {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.entry-meta {
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.4s var(--ease-out), max-height 0.4s var(--ease-out), margin 0.4s var(--ease-out);
  margin-top: 0;
}

.entry-desc {
  font-family: var(--font-sans);
  font-size: 0.85rem;
  line-height: 1.6;
  color: var(--text-secondary);
}

.entry-arrow {
  position: absolute;
  right: 2rem;
  top: 1.5rem;
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.4s, transform 0.4s;
  font-size: 1.1rem;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Field studies */
#field-studies {
  padding: 8rem 0;
  position: relative;
  z-index: 1;
}

.field-studies-header {
  padding: 0 4rem;
  margin-bottom: 4rem;
}

.studies-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  padding: 0 4rem;
}

.study-cell {
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  background: var(--glass-bg);
  backdrop-filter: blur(36px) saturate(1.3);
  -webkit-backdrop-filter: blur(36px) saturate(1.3);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: var(--glass-shadow);
  transition: transform 0.5s var(--ease-out), box-shadow 0.5s var(--ease-out);
  will-change: transform;
}

.study-cell:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 48px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.03);
}

.study-cell:hover .study-canvas-wrap { opacity: 1; }
.study-cell:hover .study-meta { opacity: 1; max-height: 80px; margin-top: 0.5rem; }

.study-canvas-wrap {
  aspect-ratio: 4/3;
  position: relative;
  overflow: hidden;
  opacity: 0.75;
  transition: opacity 0.5s;
}

.study-canvas-wrap canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.study-info {
  padding: 1.25rem 1.75rem 1.75rem;
}

.study-number {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.35rem;
}

.study-name {
  font-family: var(--font-sans);
  font-size: 1.15rem;
  font-weight: 500;
  color: var(--text-primary);
}

.study-meta {
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.4s var(--ease-out), max-height 0.4s var(--ease-out), margin 0.4s var(--ease-out);
  margin-top: 0;
}

.study-desc {
  font-family: var(--font-sans);
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--text-secondary);
}

/* Philosophy (inverted) */
#philosophy {
  padding: 10rem 4rem;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  position: relative;
  background: #111;
  overflow: hidden;
}

#philosophy-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0.15;
}

.philosophy-text {
  font-family: var(--font-sans);
  font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 300;
  line-height: 1.5;
  max-width: 720px;
  text-align: center;
  color: rgba(255,255,255,0.4);
  letter-spacing: -0.01em;
  position: relative;
  z-index: 1;
}

.philosophy-text em {
  color: #fff;
  font-style: italic;
  font-weight: 400;
}

/* Shop CTA section */
#shop-cta {
  padding: 6rem 4rem;
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
}

.shop-cta-card {
  max-width: 700px;
  width: 100%;
  padding: 4rem;
  text-align: center;
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(40px) saturate(1.3);
  -webkit-backdrop-filter: blur(40px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 20px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.02);
}

.shop-cta-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 1rem;
}

.shop-cta-title {
  font-family: var(--font-sans);
  font-size: clamp(1.5rem, 3vw, 2.25rem);
  font-weight: 300;
  color: var(--text-primary);
  margin-bottom: 1rem;
  line-height: 1.2;
  letter-spacing: -0.02em;
}

.shop-cta-desc {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 2rem;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}

.shop-cta-btn {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #fff;
  background: var(--accent-gradient);
  text-decoration: none;
  padding: 0.85rem 2.5rem;
  border-radius: 6px;
  transition: transform 0.3s var(--ease-out), box-shadow 0.3s;
  box-shadow: 0 4px 20px rgba(232,56,13,0.2);
}
.shop-cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(232,56,13,0.3);
}

/* About */
#about {
  padding: 8rem 4rem;
  position: relative;
  z-index: 1;
}

.about-inner { max-width: 1400px; margin: 0 auto; }

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  margin-top: 4rem;
}

.about-entry {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(36px) saturate(1.3);
  -webkit-backdrop-filter: blur(36px) saturate(1.3);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 3rem;
  box-shadow: var(--glass-shadow);
}

.about-name {
  font-family: var(--font-sans);
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 0.25rem;
}

.about-role {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 1rem;
}

.about-bio {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--text-secondary);
}

/* Footer */
footer {
  padding: 4rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(36px);
  -webkit-backdrop-filter: blur(36px);
  border-top: 1px solid rgba(255,255,255,0.5);
  position: relative;
  z-index: 1;
}

.footer-links {
  display: flex;
  gap: 2.5rem;
}

.footer-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color 0.3s;
}
.footer-links a:hover { color: var(--accent); }

.footer-copy {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}

/* Responsive */
@media (max-width: 1024px) {
  .catalog-entries { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
