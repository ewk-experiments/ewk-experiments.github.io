<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ewk labs</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #0A0A0A;
  color: #FAFAFA;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.gate {
  text-align: center;
  max-width: 320px;
}
.gate h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 48px;
  color: #666;
}
.gate input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #FAFAFA;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.gate input:focus {
  border-color: rgba(255,255,255,0.3);
}
.gate input::placeholder {
  color: #444;
}
.shake {
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
<div class="gate">
  <h1>ewk labs</h1>
  <input type="password" id="pw" placeholder="password" autofocus>
</div>
<script>
document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (this.value === 'ewklabs2026') {
      sessionStorage.setItem('ewk-auth', '1');
      window.location.href = '/site.html';
    } else {
      this.classList.add('shake');
      setTimeout(() => this.classList.remove('shake'), 400);
      this.value = '';
    }
  }
});
</script>
</body>
</html>
