<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Symphony — Play</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
    body {
      min-height: 100dvh;
      background: #0a0a0a;
      color: #fafafa;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .instrument-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .instrument-name {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .instrument-icon { font-size: 24px; }

    .switch-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fafafa;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .switch-btn:active { background: rgba(255,255,255,0.15); }

    .pad-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 16px 16px;
      gap: 8px;
    }

    .touch-pad {
      flex: 1;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .touch-pad canvas { width: 100%; height: 100%; display: block; }

    .axis-label {
      position: absolute;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.3;
      pointer-events: none;
    }

    .axis-label.pitch { bottom: 50%; right: 12px; writing-mode: vertical-rl; }
    .axis-label.intensity { bottom: 12px; left: 50%; transform: translateX(-50%); }

    .info-bar {
      padding: 12px 20px;
      text-align: center;
      font-size: 11px;
      opacity: 0.4;
      letter-spacing: 0.05em;
    }

    .picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
    }

    .picker-overlay.active { display: flex; }

    .picker-title {
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .picker-option {
      width: 100%;
      max-width: 320px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fafafa;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
    }

    .picker-option:active, .picker-option.selected {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    .picker-option .icon { font-size: 24px; }
    .picker-option .label { font-weight: 500; }
    .picker-option .desc { font-size: 12px; opacity: 0.5; margin-top: 2px; }

    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 24px;
      padding: 40px;
      text-align: center;
    }

    .start-screen h1 {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.02em;
    }

    .start-screen h1 span {
      background: linear-gradient(135deg, #E8380D, #D946EF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }

    .start-btn {
      background: linear-gradient(135deg, #E8380D, #D946EF);
      border: none;
      color: white;
      padding: 16px 48px;
      border-radius: 12px;
      font-size: 18px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .start-subtitle {
      font-size: 14px;
      opacity: 0.4;
      max-width: 280px;
    }

    .playing-view { display: none; flex-direction: column; min-height: 100dvh; }
    .playing-view.active { display: flex; }
  </style>
</head>
<body>

  <div class="start-screen" id="startScreen">
    <h1>join the <span>symphony</span></h1>
    <p class="start-subtitle">Your phone becomes an instrument. Tap to play. Everyone plays together.</p>
    <button class="start-btn" id="startBtn">tap to join</button>
  </div>

  <div class="playing-view" id="playingView">
    <div class="header">
      <div class="instrument-label">
        <span class="instrument-icon" id="instrIcon">🎹</span>
        <span class="instrument-name" id="instrName">Keys</span>
      </div>
      <button class="switch-btn" id="switchBtn">switch</button>
    </div>
    <div class="pad-container">
      <div class="touch-pad" id="touchPad">
        <canvas id="padCanvas"></canvas>
        <span class="axis-label pitch">pitch →</span>
        <span class="axis-label intensity">← intensity →</span>
      </div>
    </div>
    <div class="info-bar">touch the pad to play</div>
  </div>

  <div class="picker-overlay" id="picker"></div>

  <script src="https://cdn.jsdelivr.net/npm/tone@14/build/Tone.min.js"></script>
  <script>
    // ─── RELAY ──────────────────────────────────
    const WS_URL = 'wss://authors-examines-brands-got.trycloudflare.com';
    let ws = null;
    function connectWS() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => console.log('connected to relay');
      ws.onclose = () => setTimeout(connectWS, 2000);
      ws.onerror = () => {};
    }
    connectWS();

    function send(data) {
      if (ws && ws.readyState === 1) ws.send(JSON.stringify(data));
    }

    // ─── CONFIG ──────────────────────────────────
    const INSTRUMENTS = [
      {
        id: 'keys', name: 'Keys', icon: '🎹', desc: 'Warm electric piano',
        color: [232, 56, 13],
        synth: () => new Tone.PolySynth(Tone.FMSynth, {
          maxPolyphony: 6, harmonicity: 3, modulationIndex: 1.5,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.01, decay: 0.4, sustain: 0.3, release: 1.2 },
          modulation: { type: 'square' },
          modulationEnvelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 0.5 }
        })
      },
      {
        id: 'pads', name: 'Pads', icon: '🌊', desc: 'Ambient wash',
        color: [100, 60, 255],
        synth: () => new Tone.PolySynth(Tone.Synth, {
          maxPolyphony: 4,
          oscillator: { type: 'triangle8' },
          envelope: { attack: 0.8, decay: 0.5, sustain: 0.8, release: 3 }
        })
      },
      {
        id: 'bass', name: 'Bass', icon: '🔊', desc: 'Deep sub bass',
        color: [217, 70, 239],
        synth: () => new Tone.MonoSynth({
          oscillator: { type: 'sawtooth' },
          filter: { Q: 2, type: 'lowpass', rolloff: -24 },
          envelope: { attack: 0.05, decay: 0.3, sustain: 0.5, release: 0.8 },
          filterEnvelope: { attack: 0.06, decay: 0.2, sustain: 0.3, release: 0.8, baseFrequency: 80, octaves: 2.5 }
        })
      },
      {
        id: 'bells', name: 'Bells', icon: '🔔', desc: 'Crystal chimes',
        color: [56, 189, 248],
        synth: () => new Tone.PolySynth(Tone.Synth, {
          maxPolyphony: 6,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.001, decay: 1.5, sustain: 0, release: 2 }
        })
      },
      {
        id: 'strings', name: 'Strings', icon: '🎻', desc: 'Lush orchestral',
        color: [245, 158, 11],
        synth: () => new Tone.PolySynth(Tone.AMSynth, {
          maxPolyphony: 4, harmonicity: 2,
          oscillator: { type: 'triangle' },
          envelope: { attack: 0.3, decay: 0.4, sustain: 0.7, release: 2 },
          modulation: { type: 'sine' },
          modulationEnvelope: { attack: 0.5, decay: 0.2, sustain: 0.5, release: 1 }
        })
      },
      {
        id: 'perc', name: 'Percussion', icon: '🥁', desc: 'Rhythmic hits',
        color: [34, 197, 94],
        synth: () => new Tone.MembraneSynth({
          pitchDecay: 0.05, octaves: 6,
          oscillator: { type: 'sine' },
          envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.2 }
        })
      }
    ];

    const PENTATONIC = ['C', 'D', 'E', 'G', 'A'];
    function getNote(nx, octaveBase) {
      const idx = Math.floor(nx * PENTATONIC.length);
      const note = PENTATONIC[Math.min(idx, PENTATONIC.length - 1)];
      const octave = octaveBase + Math.floor(nx * 2);
      return note + octave;
    }

    // ─── STATE ──────────────────────────────────
    let currentInstrument = null;
    let synth = null, filter = null, reverb = null;
    let activeNotes = new Map();
    const playerId = Math.random().toString(36).substr(2, 8);
    let ripples = [];

    function getOctaveBase() {
      if (!currentInstrument) return 4;
      const m = { bass: 1, pads: 3, strings: 3, perc: 2 };
      return m[currentInstrument.id] || 4;
    }

    // ─── AUDIO ──────────────────────────────────
    function setupInstrument(instr) {
      if (synth) synth.dispose();
      if (filter) filter.dispose();
      if (reverb) reverb.dispose();

      currentInstrument = instr;
      reverb = new Tone.Reverb({ decay: 3, wet: 0.3 }).toDestination();
      filter = new Tone.Filter({ frequency: 2000, type: 'lowpass' }).connect(reverb);
      synth = instr.synth();
      synth.connect(filter);
      if (synth.volume) synth.volume.value = -8;

      document.getElementById('instrIcon').textContent = instr.icon;
      document.getElementById('instrName').textContent = instr.name;

      send({ type: 'join', playerId, instrument: instr.id, name: instr.name, icon: instr.icon, color: instr.color });
    }

    // ─── TOUCH ──────────────────────────────────
    const padCanvas = document.getElementById('padCanvas');
    const ctx = padCanvas.getContext('2d');
    const touchPad = document.getElementById('touchPad');

    function resizeCanvas() {
      const rect = touchPad.getBoundingClientRect();
      padCanvas.width = rect.width * window.devicePixelRatio;
      padCanvas.height = rect.height * window.devicePixelRatio;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    }

    function handleTouch(e, isStart) {
      e.preventDefault();
      const rect = touchPad.getBoundingClientRect();
      const touches = e.changedTouches || [e];
      for (let t of touches) {
        const x = Math.max(0, Math.min(1, (t.clientX - rect.left) / rect.width));
        const y = Math.max(0, Math.min(1, 1 - (t.clientY - rect.top) / rect.height));
        const note = getNote(x, getOctaveBase());
        if (filter) filter.frequency.rampTo(200 + y * 4000, 0.1);
        if (isStart) {
          if (currentInstrument?.id === 'perc') {
            synth.triggerAttackRelease(note, '8n');
          } else {
            synth.triggerAttack(note);
          }
          activeNotes.set(t.identifier ?? 'mouse', note);
          send({ type: 'note', playerId, instrument: currentInstrument?.id, note, x, y, on: true });
        }
        const c = currentInstrument?.color || [255,255,255];
        ripples.push({ x: x * rect.width, y: (1-y) * rect.height, r: 0, maxR: 80+y*60, alpha: 0.6, color: c });
      }
    }

    function handleTouchEnd(e) {
      e.preventDefault();
      const touches = e.changedTouches || [e];
      for (let t of touches) {
        const note = activeNotes.get(t.identifier ?? 'mouse');
        if (note && currentInstrument?.id !== 'perc') synth.triggerRelease(note);
        activeNotes.delete(t.identifier ?? 'mouse');
        send({ type: 'note', playerId, instrument: currentInstrument?.id, note, on: false });
      }
    }

    function handleTouchMove(e) {
      e.preventDefault();
      const rect = touchPad.getBoundingClientRect();
      const touches = e.changedTouches || [e];
      for (let t of touches) {
        const y = Math.max(0, Math.min(1, 1 - (t.clientY - rect.top) / rect.height));
        if (filter) filter.frequency.rampTo(200 + y * 4000, 0.1);
      }
    }

    // ─── CANVAS ─────────────────────────────────
    function drawPad() {
      const w = touchPad.clientWidth, h = touchPad.clientHeight;
      ctx.clearRect(0, 0, w, h);
      const c = currentInstrument?.color || [255,255,255];

      // Bg gradient
      const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.7);
      grad.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},0.08)`);
      grad.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0.02)`);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let i = 1; i < 5; i++) { const gx = (w/5)*i; ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,h); ctx.stroke(); }
      for (let i = 1; i < 4; i++) { const gy = (h/4)*i; ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(w,gy); ctx.stroke(); }

      // Note labels
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.font = '11px system-ui';
      ctx.textAlign = 'center';
      for (let i = 0; i < 5; i++) ctx.fillText(PENTATONIC[i], (w/5)*i+(w/10), h-8);

      // Ripples
      ripples = ripples.filter(r => r.alpha > 0.01);
      for (let r of ripples) {
        r.r += 3; r.alpha *= 0.95;
        ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${r.color[0]},${r.color[1]},${r.color[2]},${r.alpha})`;
        ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = `rgba(${r.color[0]},${r.color[1]},${r.color[2]},${r.alpha*0.15})`;
        ctx.fill();
      }
      requestAnimationFrame(drawPad);
    }

    // ─── PICKER ─────────────────────────────────
    function showPicker() {
      const picker = document.getElementById('picker');
      picker.innerHTML = '<div class="picker-title">choose your instrument</div>';
      INSTRUMENTS.forEach(instr => {
        const btn = document.createElement('button');
        btn.className = 'picker-option' + (currentInstrument?.id === instr.id ? ' selected' : '');
        btn.innerHTML = `<span class="icon">${instr.icon}</span><div><div class="label">${instr.name}</div><div class="desc">${instr.desc}</div></div>`;
        btn.onclick = () => {
          setupInstrument(instr);
          send({ type: 'switch', playerId, instrument: instr.id, name: instr.name, icon: instr.icon, color: instr.color });
          picker.classList.remove('active');
        };
        picker.appendChild(btn);
      });
      picker.classList.add('active');
    }

    // ─── INIT ───────────────────────────────────
    document.getElementById('startBtn').addEventListener('click', async () => {
      await Tone.start();
      const randomInstr = INSTRUMENTS[Math.floor(Math.random() * INSTRUMENTS.length)];
      setupInstrument(randomInstr);
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('playingView').classList.add('active');
      resizeCanvas();
      drawPad();
      touchPad.addEventListener('touchstart', e => handleTouch(e, true));
      touchPad.addEventListener('touchmove', handleTouchMove);
      touchPad.addEventListener('touchend', handleTouchEnd);
      touchPad.addEventListener('touchcancel', handleTouchEnd);
      touchPad.addEventListener('mousedown', e => handleTouch(e, true));
      touchPad.addEventListener('mousemove', e => { if (e.buttons) handleTouchMove(e); });
      touchPad.addEventListener('mouseup', handleTouchEnd);
    });

    document.getElementById('switchBtn').addEventListener('click', showPicker);
    window.addEventListener('resize', () => {
      if (document.getElementById('playingView').classList.contains('active')) resizeCanvas();
    });
  </script>
</body>
</html>
